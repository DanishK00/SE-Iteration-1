<!DOCTYPE html>
<html>
<head>
    <title>TLEB Home</title>
    <link rel="stylesheet" href="home.css">

    <style>
      
        #responseContainer {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .llm-card {
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            background: #f9f9f9;
        }

        .llm-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="side-search">
    <input id="searchInput" type="text" placeholder="Search old logs?" oninput="searchLogs()" />
    <h3 class="logs-title">Previous Chats</h3>
    <div id="oldLogsContainer"></div>
</div>

<button id="logoutBtn">Logout</button>
<button id="clearChatBtn">Clear Chat</button>

<div class="center-container">

    <div class="title-box">
        <h1>TLEB</h1>
        <p>Welcome to your dashboard</p>
    </div>

    <!-- CHAT -->
    <div class="chat-container">
        <div id="chatBox" class="chat-box">
            <p><strong>AI:</strong> Welcome. How can I help you?</p>
        </div>

        <!-- NEW: multi-LLM responses -->
        <div id="responseContainer"></div>

        <div class="chat-input">
            <input id="messageInput" type="text" placeholder="Type a message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

</div>

<script>
window.onload = function() {

async function sendMessage() {
    let input = document.getElementById("messageInput");
    let message = input.value;

    if (message.trim() === "") return;

    let chatBox = document.getElementById("chatBox");

    // show user message
    chatBox.innerHTML += `<p><strong>You:</strong> ${message}</p>`;
    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        // 🔥 NEW: call multi-LLM endpoint
        const response = await fetch("http://localhost:3000/api/llm/query", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                prompt: message,
                models: ["llama3", "mistral", "tinyllama"]
            })
        });

        const results = await response.json();

        displayResponses(results);

    } catch (error) {
        chatBox.innerHTML += `<p><strong>AI:</strong> Error getting response</p>`;
        console.error(error);
    }

    saveChatToStorage();
    saveCurrentSession();
    chatBox.scrollTop = chatBox.scrollHeight;
}

function displayResponses(results) {
    const container = document.getElementById("responseContainer");
    container.innerHTML = "";

    results.forEach(result => {
        const card = document.createElement("div");
        card.classList.add("llm-card");

        const text = result.status === "success"
            ? result.response
            : "Error: " + result.error;

        card.innerHTML = `
            <div class="llm-title">${result.modelName}</div>
            <div>${text}</div>
        `;

        // 🔥 MAKE WHOLE CARD CLICKABLE
        card.style.cursor = "pointer";

        card.addEventListener("click", () => {
            insertIntoChat(text, result.modelName);
        });

        container.appendChild(card);
    });
}
function insertIntoChat(text, modelName) {
    const chatBox = document.getElementById("chatBox");

    chatBox.innerHTML += `
        <p><strong>${modelName} (selected):</strong> ${text}</p>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;
}
document.getElementById("messageInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

document.getElementById("logoutBtn").addEventListener("click", function() {
    window.location.href = "../login/index.html";
});

function saveChatToStorage() {
    const messages = document.getElementById("chatBox").innerHTML;
    localStorage.setItem("chatHistory", messages);
}

function loadChatFromStorage() {
    const chatBox = document.getElementById("chatBox");
    const saved = localStorage.getItem("chatHistory");

    if (saved) {
        chatBox.innerHTML = saved;
        chatBox.scrollTop = chatBox.scrollHeight;
    }
}

window.searchLogs = function() {
    const input = document.getElementById("searchInput").value.toLowerCase();
    const messages = document.getElementById("chatBox").getElementsByTagName("p");

    for (let msg of messages) {
        if (msg.textContent.toLowerCase().includes(input)) {
            msg.style.backgroundColor = "#ffff99";
        } else {
            msg.style.backgroundColor = "transparent";
        }
    }
};

function saveCurrentSession() {
    const chatBox = document.getElementById("chatBox");
    const session = chatBox.innerHTML;

    let sessions = JSON.parse(localStorage.getItem("chatSessions") || "[]");

    sessions.push({
        timestamp: new Date().toLocaleString(),
        content: session
    });

    localStorage.setItem("chatSessions", JSON.stringify(sessions));

    renderOldLogs();
}

function renderOldLogs() {
    const container = document.getElementById("oldLogsContainer");
    if (!container) return;

    container.innerHTML = "";

    let sessions = JSON.parse(localStorage.getItem("chatSessions") || "[]");

    sessions.forEach((session, index) => {
        const div = document.createElement("div");
        div.classList.add("old-log-item");
        div.textContent = `Session ${index + 1} - ${session.timestamp}`;
        div.onclick = () => loadSession(index);
        container.appendChild(div);
    });
}

function loadSession(index) {
    const sessions = JSON.parse(localStorage.getItem("chatSessions") || "[]");

    if (sessions[index]) {
        document.getElementById("chatBox").innerHTML = sessions[index].content;
    }
}

function clearChat() {
    const chatBox = document.getElementById("chatBox");

    chatBox.innerHTML = `<p><strong>AI:</strong> Welcome. How can I help you?</p>`;
    document.getElementById("responseContainer").innerHTML = "";

    localStorage.removeItem("chatHistory");
    localStorage.removeItem("chatSessions");
}

document.getElementById("clearChatBtn").addEventListener("click", clearChat);

loadChatFromStorage();
renderOldLogs();

};
</script>

</body>
</html>
