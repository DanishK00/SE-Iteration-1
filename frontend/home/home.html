<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TLEB Dashboard</title>
  <link rel="stylesheet" href="home.css">
</head>
<body data-theme="light">
  <div class="page-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Previous Chats</h2>
        <p>Your saved sessions</p>
      </div>

      <div class="search-panel">
        <input type="text" id="searchInput" placeholder="Search old logs...">
        <button class="sidebar-btn" onclick="searchLogs()">Search</button>
      </div>

      <div class="sidebar-actions">
        <button class="sidebar-btn new-chat-btn" id="newChatBtn">+ New Chat</button>
      </div>

      <div id="chatHistory" class="chat-history">
        <div class="history-placeholder">No chats yet</div>
      </div>
    </aside>

    <main class="main-area">
      <header class="hero-card">
        <div class="hero-text">
          <h1>TLEB</h1>
          <p>Welcome to your dashboard</p>
        </div>

        <div class="hero-actions">
          <button id="themeToggleBtn" class="theme-btn">Dark Mode</button>
          <button id="clearChatBtn" class="clear-btn">Clear Chat</button>
          <button id="logoutBtn" class="logout-btn">Log Out</button>
        </div>
      </header>

      <section class="chat-wrapper">
        <div id="chatBox" class="chat-box">
          <div class="message bot-message">
            <span class="label">AI</span>
            <p>Welcome. How can I help you?</p>
          </div>
        </div>

        <div class="chat-input-bar">
          <input id="messageInput" type="text" placeholder="Type a message...">
          <button id="sendBtn">Send</button>
          <button id="stopBtn" class="stop-btn" style="display:none;">Stop</button>
        </div>
      </section>
    </main>
  </div>

  <script src="home.js"></script>
</body>
</html>
