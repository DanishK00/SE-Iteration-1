<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-LLM Compare</title>
  <link rel="stylesheet" href="multiLLMChat.css">
</head>
<body>

  <div class="page-wrapper">

    <div class="side-search">
      <input id="searchInput" type="text" placeholder="Search old logs?" oninput="searchLogs()" />
      <h3 class="logs-title">Previous Chats</h3>
      <div id="oldLogsContainer"></div>
    </div>

    <div class="center-container">

      <div class="title-box">
        <h1>TLEB</h1>
        <p>Compare responses from multiple LLMs at once</p>
      </div>

      <div class="model-selector">
        <p class="selector-label">Select models to query:</p>
        <div class="checkbox-group">
          <label><input type="checkbox" name="model" value="llama3" checked> llama3</label>
          <label><input type="checkbox" name="model" value="mistral"> mistral</label>
          <label><input type="checkbox" name="model" value="gemma"> gemma</label>
        </div>
      </div>

      <div class="prompt-bar">
        <input id="promptInput" type="text" placeholder="Type a message to send to all selected models..." />
        <button id="sendBtn" onclick="sendToAll()">Send</button>
      </div>

      <div id="comparisonGrid" class="comparison-grid"></div>

      <div class="nav-links">
        <a href="../home/home.html">← Back to Home</a>
      </div>

    </div>

    <button id="logoutBtn">Logout</button>
    <button id="clearBtn">Clear</button>

  </div>

  <script>
    document.getElementById("logoutBtn").addEventListener("click", () => {
      window.location.href = "../login/index.html";
    });

    document.getElementById("clearBtn").addEventListener("click", clearAll);

    document.getElementById("promptInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendToAll();
    });

    function getSelectedModels() {
      return Array.from(document.querySelectorAll('input[name="model"]:checked'))
        .map(cb => cb.value);
    }

    // Feature 3: Copy response text to clipboard
    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = "Copied!";
        btn.disabled = true;
        setTimeout(() => {
          btn.textContent = "Copy";
          btn.disabled = false;
        }, 2000);
      }).catch(() => {
        btn.textContent = "Failed";
        setTimeout(() => { btn.textContent = "Copy"; }, 2000);
      });
    }

    async function sendToAll() {
      const prompt = document.getElementById("promptInput").value.trim();
      if (!prompt) return;

      const models = getSelectedModels();
      if (models.length === 0) {
        alert("Please select at least one model.");
        return;
      }

      document.getElementById("sendBtn").disabled = true;
      document.getElementById("promptInput").value = "";

      const grid = document.getElementById("comparisonGrid");

      const row = document.createElement("div");
      row.className = "comparison-row";

      const promptLabel = document.createElement("div");
      promptLabel.className = "prompt-label";
      promptLabel.innerHTML = `<strong>You:</strong> ${escapeHtml(prompt)}`;
      row.appendChild(promptLabel);

      const cols = document.createElement("div");
      cols.className = "response-columns";
      cols.style.gridTemplateColumns = `repeat(${models.length}, 1fr)`;

      const columnEls = {};
      const timerEls = {};

      models.forEach(model => {
        const col = document.createElement("div");
        col.className = "response-col";
        col.innerHTML = `
          <div class="model-header">
            <span class="model-tag">${model}</span>
            <span class="response-timer" id="timer-${model}">⏱ waiting...</span>
          </div>
          <div class="response-body loading" id="body-${model}">Waiting...</div>
          <button class="copy-btn" id="copy-${model}" style="display:none"
            onclick="copyToClipboard(document.getElementById('body-${model}').textContent, this)">
            Copy
          </button>
        `;
        cols.appendChild(col);
        columnEls[model] = col.querySelector(`#body-${model}`);
        timerEls[model]  = col.querySelector(`#timer-${model}`);
      });

      row.appendChild(cols);
      grid.appendChild(row);
      grid.scrollTop = grid.scrollHeight;

      const requests = models.map(model => {
        const startTime = Date.now(); // Feature 1: start timer

        return fetch("http://localhost:4003/api/chat/multi", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt, models: [model] })
        })
        .then(res => res.json())
        .then(data => {
          const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
          const result  = data.results && data.results[0];
          const bodyEl  = columnEls[model];
          const timerEl = timerEls[model];
          const copyBtn = document.getElementById(`copy-${model}`);

          bodyEl.classList.remove("loading");
          timerEl.textContent = `⏱ ${elapsed}s`; // Feature 1: show elapsed time

          if (result && result.response) {
            bodyEl.textContent = result.response;
            copyBtn.style.display = "inline-block"; // Feature 3: reveal copy button
          } else {
            bodyEl.classList.add("error");
            bodyEl.textContent = result?.error || "No response received.";
          }
        })
        .catch(() => {
          const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
          columnEls[model].classList.remove("loading");
          columnEls[model].classList.add("error");
          columnEls[model].textContent = "Error: could not reach server.";
          timerEls[model].textContent  = `⏱ ${elapsed}s`;
        });
      });

      await Promise.all(requests);
      document.getElementById("sendBtn").disabled = false;
      saveSession();
    }

    window.searchLogs = function () {
      const input = document.getElementById("searchInput").value.toLowerCase();
      document.querySelectorAll(".response-body, .prompt-label").forEach(el => {
        el.style.backgroundColor = (input && el.textContent.toLowerCase().includes(input))
          ? "#ffff99" : "";
      });
    };

    function saveSession() {
      const grid = document.getElementById("comparisonGrid");
      let sessions = JSON.parse(localStorage.getItem("multiSessions") || "[]");
      sessions.push({ timestamp: new Date().toLocaleString(), content: grid.innerHTML });
      localStorage.setItem("multiSessions", JSON.stringify(sessions));
      renderOldLogs();
    }

    function renderOldLogs() {
      const container = document.getElementById("oldLogsContainer");
      if (!container) return;
      container.innerHTML = "";
      JSON.parse(localStorage.getItem("multiSessions") || "[]").forEach((s, i) => {
        const div = document.createElement("div");
        div.classList.add("old-log-item");
        div.textContent = `Session ${i + 1} - ${s.timestamp}`;
        div.onclick = () => loadSession(i);
        container.appendChild(div);
      });
    }

    function loadSession(index) {
      const sessions = JSON.parse(localStorage.getItem("multiSessions") || "[]");
      if (sessions[index]) document.getElementById("comparisonGrid").innerHTML = sessions[index].content;
    }

    function clearAll() {
      document.getElementById("comparisonGrid").innerHTML = "";
      localStorage.removeItem("multiSessions");
      renderOldLogs();
    }

    function escapeHtml(text) {
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    renderOldLogs();
  </script>
</body>
</html>
