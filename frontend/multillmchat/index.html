<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-LLM Compare</title>
  <link rel="stylesheet" href="multiLLMChat.css">
</head>
<body>

  <div class="page-wrapper">

    <!-- Sidebar (matches home.html layout) -->
    <div class="side-search">
      <input id="searchInput" type="text" placeholder="Search old logs?" oninput="searchLogs()" />
      <h3 class="logs-title">Previous Chats</h3>
      <div id="oldLogsContainer"></div>
    </div>

    <!-- Main content -->
    <div class="center-container">

      <div class="title-box">
        <h1>TLEB</h1>
        <p>Compare responses from multiple LLMs at once</p>
      </div>

      <!-- Model selector -->
      <div class="model-selector">
        <p class="selector-label">Select models to query:</p>
        <div class="checkbox-group">
          <label><input type="checkbox" name="model" value="llama3" checked> llama3</label>
          <label><input type="checkbox" name="model" value="mistral"> mistral</label>
          <label><input type="checkbox" name="model" value="gemma"> gemma</label>
        </div>
      </div>

      <!-- Prompt input -->
      <div class="prompt-bar">
        <input id="promptInput" type="text" placeholder="Type a message to send to all selected models..." />
        <button id="sendBtn" onclick="sendToAll()">Send</button>
      </div>

      <!-- Comparison grid — columns appear dynamically -->
      <div id="comparisonGrid" class="comparison-grid"></div>

      <!-- Back nav -->
      <div class="nav-links">
        <a href="../home/home.html">← Back to Home</a>
      </div>

    </div>

    <!-- Top-right buttons matching home.html -->
    <button id="logoutBtn">Logout</button>
    <button id="clearBtn">Clear</button>

  </div>

  <script>
    // --- Auth / nav ---
    document.getElementById("logoutBtn").addEventListener("click", () => {
      window.location.href = "../login/index.html";
    });

    document.getElementById("clearBtn").addEventListener("click", clearAll);

    document.getElementById("promptInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendToAll();
    });

    // --- Get selected models ---
    function getSelectedModels() {
      return Array.from(document.querySelectorAll('input[name="model"]:checked'))
        .map(cb => cb.value);
    }

    // --- Send prompt to all selected models ---
    async function sendToAll() {
      const prompt = document.getElementById("promptInput").value.trim();
      if (!prompt) return;

      const models = getSelectedModels();
      if (models.length === 0) {
        alert("Please select at least one model.");
        return;
      }

      document.getElementById("sendBtn").disabled = true;
      document.getElementById("promptInput").value = "";

      const grid = document.getElementById("comparisonGrid");

      // Build a row: prompt header + one column per model
      const row = document.createElement("div");
      row.className = "comparison-row";

      // Prompt label spanning the row
      const promptLabel = document.createElement("div");
      promptLabel.className = "prompt-label";
      promptLabel.innerHTML = `<strong>You:</strong> ${escapeHtml(prompt)}`;
      row.appendChild(promptLabel);

      // Response columns container
      const cols = document.createElement("div");
      cols.className = "response-columns";
      cols.style.gridTemplateColumns = `repeat(${models.length}, 1fr)`;

      // Create a column per model, each starting with a loading state
      const columnEls = {};
      models.forEach(model => {
        const col = document.createElement("div");
        col.className = "response-col";
        col.innerHTML = `
          <div class="model-tag">${model}</div>
          <div class="response-body loading" id="col-${model}-${Date.now()}">Waiting...</div>
        `;
        cols.appendChild(col);
        columnEls[model] = col.querySelector(".response-body");
      });

      row.appendChild(cols);
      grid.appendChild(row);
      grid.scrollTop = grid.scrollHeight;

      // Fire all requests simultaneously
      const requests = models.map(model =>
        fetch("http://localhost:4003/api/chat/multi", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt, models: [model] })
        })
        .then(res => res.json())
        .then(data => {
          const result = data.results && data.results[0];
          const el = columnEls[model];
          el.classList.remove("loading");
          if (result && result.response) {
            el.textContent = result.response;
          } else {
            el.classList.add("error");
            el.textContent = result?.error || "No response received.";
          }
        })
        .catch(err => {
          const el = columnEls[model];
          el.classList.remove("loading");
          el.classList.add("error");
          el.textContent = "Error: could not reach server.";
        })
      );

      await Promise.all(requests);
      document.getElementById("sendBtn").disabled = false;
      saveSession();
    }

    // --- Search highlights (same as home.html) ---
    window.searchLogs = function () {
      const input = document.getElementById("searchInput").value.toLowerCase();
      document.querySelectorAll(".response-body, .prompt-label").forEach(el => {
        el.style.backgroundColor = (input && el.textContent.toLowerCase().includes(input))
          ? "#ffff99"
          : "";
      });
    };

    // --- Session persistence (same pattern as home.html) ---
    function saveSession() {
      const grid = document.getElementById("comparisonGrid");
      let sessions = JSON.parse(localStorage.getItem("multiSessions") || "[]");
      sessions.push({
        timestamp: new Date().toLocaleString(),
        content: grid.innerHTML
      });
      localStorage.setItem("multiSessions", JSON.stringify(sessions));
      renderOldLogs();
    }

    function renderOldLogs() {
      const container = document.getElementById("oldLogsContainer");
      if (!container) return;
      container.innerHTML = "";
      const sessions = JSON.parse(localStorage.getItem("multiSessions") || "[]");
      sessions.forEach((session, index) => {
        const div = document.createElement("div");
        div.classList.add("old-log-item");
        div.textContent = `Session ${index + 1} - ${session.timestamp}`;
        div.onclick = () => loadSession(index);
        container.appendChild(div);
      });
    }

    function loadSession(index) {
      const sessions = JSON.parse(localStorage.getItem("multiSessions") || "[]");
      if (sessions[index]) {
        document.getElementById("comparisonGrid").innerHTML = sessions[index].content;
      }
    }

    function clearAll() {
      document.getElementById("comparisonGrid").innerHTML = "";
      localStorage.removeItem("multiSessions");
      renderOldLogs();
    }

    // --- Escape HTML to prevent XSS ---
    function escapeHtml(text) {
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Init
    renderOldLogs();
  </script>
</body>
</html>
